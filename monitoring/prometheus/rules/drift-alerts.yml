groups:
  - name: drift-critical-rules
    rules:
      - alert: DriftCriticalKS
        expr: drift_numeric_ks_max > drift_threshold_ks
        for: 5m
        labels:
          severity: critical
          type: drift
        annotations:
          summary: "Critical numeric KS drift"
          description: "Max KS={{ $value }} is above the configured critical KS threshold"

      - alert: DriftCriticalJS
        expr: drift_categorical_js_max > drift_threshold_js
        for: 5m
        labels:
          severity: critical
          type: drift
        annotations:
          summary: "Critical categorical JS drift"
          description: "Max JS={{ $value }} is above configured threshold"

      - alert: DriftCriticalPSI
        expr: drift_numeric_psi_max > drift_threshold_psi
        for: 5m
        labels:
          severity: critical
          type: drift
        annotations:
          summary: "Critical PSI drift"
          description: "Max PSI={{ $value }} exceeds critical PSI threshold"

      - alert: DriftHighFeatureFraction
        expr: drift_features_alert_fraction > drift_threshold_feature_fraction
        for: 5m
        labels:
          severity: critical
          type: drift
        annotations:
          summary: "High fraction of drifted features"
          description: "Drifted feature fraction={{ $value }} exceeds configured fraction threshold"

      - alert: DriftRetrainingRecommended
        expr: drift_retrain_recommended == 1
        for: 2m
        labels:
          severity: warning
          type: retraining
        annotations:
          summary: "Retraining recommendation triggered"
          description: "Exporter indicates retraining should be considered"