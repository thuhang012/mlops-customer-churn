# CI workflow for the M5/CICD workstream.
# Purpose: run linting and tests on code changes only.
name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - '**/*.md'
      - 'notebooks/**'
      - 'reports/**'
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff (critical errors only)
        run: python -m ruff check src tests --select E,F

      - name: Run tests
        run: python -m pytest -m "not ct" tests/
