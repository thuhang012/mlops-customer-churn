global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/drift-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: api
    static_configs:
      - targets:
          - api:8000
    metrics_path: /metrics

  - job_name: drift_exporter
    static_configs:
      - targets:
          - drift-exporter:9108

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080