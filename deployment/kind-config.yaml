kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  # UI (Streamlit) Mapping
  - containerPort: 30000
    hostPort: 30000
    protocol: TCP
  # FastAPI Mapping
  - containerPort: 30100
    hostPort: 30100
    protocol: TCP
  # Grafana Mapping
  - containerPort: 30200
    hostPort: 30200
    protocol: TCP
  # Prometheus Mapping
  - containerPort: 30300
    hostPort: 30300
    protocol: TCP
  # MLflow Tracking Mapping
  - containerPort: 30500
    hostPort: 30500
    protocol: TCP
- role: worker
- role: worker
