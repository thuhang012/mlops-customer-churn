# CI workflow for the M5/CI workstream.
# Purpose: run linting and tests on code changes only.
name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - '**/*.md'
      - 'notebooks/**'
      - 'reports/**'
  pull_request:
    branches: ["**"]
    paths-ignore:
      - '**/*.md'
      - 'notebooks/**'
      - 'reports/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff (critical errors only)
        run: python -m ruff check src tests --select E,F

  security-audit:
    runs-on: ubuntu-latest
    needs: ruff-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bandit
        run: python -m bandit -r src -q

      - name: Run pip-audit
        run: python -m pip_audit

  pytest-fast:
    runs-on: ubuntu-latest
    needs: [ruff-lint, security-audit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -m fast tests/
