name: Monitoring

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  PYTHON_VERSION: "3.10"

jobs:
  check-drift-metrics:
    runs-on: ubuntu-latest
    outputs:
      drift-detected: ${{ steps.check.outputs.drift_detected }}
      degradation-detected: ${{ steps.check.outputs.degradation_detected }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run monitoring checks
        id: check
        continue-on-error: true
        run: python src/mlops_project/monitoring/checks.py
      
      - name: Upload monitoring results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-results
          path: reports/monitoring/
          retention-days: 30

      - name: Fail monitoring job when checks fail
        if: steps.check.outcome == 'failure'
        run: exit 1
  
  # Auto-trigger retraining if issues detected
  auto-retrain:
    runs-on: ubuntu-latest
    needs: check-drift-metrics
    if: |
      needs['check-drift-metrics'].outputs['drift-detected'] == 'true' ||
      needs['check-drift-metrics'].outputs['degradation-detected'] == 'true'
    
    steps:
      - name: Trigger CT Pipeline
        uses: actions/github-script@v7
        with:
          script: |
            let reason = 'drift-detected';
            if ('${{ needs['check-drift-metrics'].outputs['degradation-detected'] }}' === 'true') {
              reason = 'performance-degradation';
            }
            
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ct.yml',
              ref: 'main',
              inputs: {
                reason: reason
              }
            });
            
            console.log(`✅ Triggered CT Pipeline (reason: ${reason})`);
  
  publish-summary:
    runs-on: ubuntu-latest
    needs: [check-drift-metrics, auto-retrain]
    if: always()
    
    steps:
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: monitoring-results
          path: ./
      
      - name: Summary
        run: |
          echo "## 🔍 Monitoring Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Drift detected: ${{ needs['check-drift-metrics'].outputs['drift-detected'] }}" >> $GITHUB_STEP_SUMMARY
          echo "- Degradation: ${{ needs['check-drift-metrics'].outputs['degradation-detected'] }}" >> $GITHUB_STEP_SUMMARY
          echo "- Auto-Retrain: ${{ needs.auto-retrain.result }}" >> $GITHUB_STEP_SUMMARY
