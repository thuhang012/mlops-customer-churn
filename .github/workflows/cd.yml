# CD workflow for the M5/CICD workstream.
# Purpose: build and smoke-test the container on every branch, but push images only on main.
name: CD

on:
  push:
    branches: ["**"]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'src/mlops_project/api/**'
      - 'scripts/entrypoint.sh'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mlops-project-api

permissions:
  contents: read
  packages: write

jobs:
  build_and_smoke_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mlops-project-api:cd .

      - name: Run container
        run: |
          docker run -d --name mlops-api-test -p 8000:8000 mlops-project-api:cd
          sleep 5

      - name: Smoke test health endpoint
        run: |
          for i in {1..12}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              echo "Health endpoint is up"
              exit 0
            fi
            echo "Waiting for service... attempt $i/12"
            sleep 5
          done
          echo "Service did not become healthy in time"
          exit 1

      - name: Print container logs on failure
        if: failure()
        run: docker logs mlops-api-test

      - name: Cleanup test container
        if: always()
        run: docker rm -f mlops-api-test || true

  push_image:
    runs-on: ubuntu-latest
    needs: build_and_smoke_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: vars
        run: echo "sha_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_tag }}
            ${{ env.IMAGE_NAME }}:latest

  deployment_report:
    runs-on: ubuntu-latest
    needs: [build_and_smoke_test, push_image]
    if: always()

    steps:
      - name: Write deployment summary
        run: |
          {
            echo "## CD Summary"
            echo "- Event: ${{ github.event_name }}"
            echo "- Ref: ${{ github.ref }}"
            echo "- Build and smoke test: ${{ needs.build_and_smoke_test.result }}"
            echo "- Push image: ${{ needs.push_image.result }}"
            echo "- Image: ${{ env.IMAGE_NAME }}"
            echo "- Commit: ${{ github.sha }}"
          } >> $GITHUB_STEP_SUMMARY
