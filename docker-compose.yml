services:
  # Service 1: API Churn Prediction (FastAPI + Uvicorn)
  api:
    build: .
    container_name: churn_api_container
    ports:
      - "8000:8000"
    networks:
      mlops_bridge:
        aliases:
          - churn_api
    volumes:
      # Hot-reload code cho M3 phát triển
      - ./src:/home/user/app/src
      # Mount data và artifacts ra host để file .pkl tồn tại vĩnh viễn
      - ./data:/home/user/app/data
      - ./artifacts:/home/user/app/artifacts
      - ./monitoring:/home/user/app/monitoring
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/home/user/app/src
      - DAGSHUB_USERNAME=${DAGSHUB_USERNAME:-${DAGSHUB_USER:-}}
      - DAGSHUB_TOKEN=${DAGSHUB_TOKEN:-}
    depends_on:
      mlflow:
        condition: service_healthy

  drift-exporter:
    build: .
    container_name: drift_metrics_exporter
    command:
      [
        "python",
        "src/mlops_project/monitoring/drift_metrics_exporter.py",
        "--port",
        "9108",
        "--poll-interval",
        "10",
        "--fast-interval",
        "300",
        "--slow-interval",
        "1800",
        "--fast-refresh-interval",
        "60",
        "--medium-refresh-interval",
        "300",
        "--min-new-rows",
        "100",
        "--current-window-size",
        "5000"
      ]
    ports:
      - "9108:9108"
    networks:
      - mlops_bridge
    volumes:
      - ./src:/home/user/app/src
      - ./data:/home/user/app/data
      - ./artifacts:/home/user/app/artifacts
    environment:
      - PYTHONPATH=/home/user/app/src
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - mlops_bridge
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      - drift-exporter

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    ports:
      - "8081:8080"
    networks:
      - mlops_bridge
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    depends_on:
      - api

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    networks:
      - mlops_bridge
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

  grafana:
    image: grafana/grafana-oss:11.1.4
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - mlops_bridge
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  # Service 2: MLflow Tracking Server cho M2
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: mlflow_tracker
    hostname: mlflow
    ports:
      - "5555:5000"
    networks:
      mlops_bridge:
        aliases:
          - mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --serve-artifacts --artifacts-destination /home/user/app/artifacts/mlruns
    volumes:
      # Persistent Volume: dữ liệu MLflow tồn tại qua các lần restart
      - mlflow_db_v3:/mlflow
      # Mount chung thư mục artifacts để giải quyết lỗi Permission
      - ./artifacts:/home/user/app/artifacts
    healthcheck:
      # Kiểm tra MLflow thực sự sẵn sàng nhận request (không chỉ process đang chạy)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

# Mạng nội bộ cô lập các Service
networks:
  mlops_bridge:
    driver: bridge

# Kho chứa data vĩnh viễn cho MLflow
volumes:
  mlflow_db_v3:
  prometheus_data:
  grafana_data:
  alertmanager_data:
