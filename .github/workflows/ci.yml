# CI workflow for the M5/CI workstream.
# Purpose: run linting and tests on code changes only.
name: CI

on:
  push:
    branches: ["main", "master"]
    paths-ignore:
      - '**/*.md'
      - 'notebooks/**'
      - 'reports/**'
  pull_request:
    branches: ["main", "master"]
    paths-ignore:
      - '**/*.md'
      - 'notebooks/**'
      - 'reports/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff (critical errors only)
        run: python -m ruff check src tests --select E,F

  security-audit:
    runs-on: ubuntu-latest
    needs: ruff-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bandit
        run: python -m bandit -r src -q

      - name: Run pip-audit
        # CVE-2025-69872 (diskcache) currently has no published fixed version.
        # Keep auditing active and fail on all other vulnerabilities.
        run: python -m pip_audit --ignore-vuln CVE-2025-69872

  pytest-fast:
    runs-on: ubuntu-latest
    needs: [ruff-lint, security-audit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure DagsHub secrets exist
        run: |
          if [ -z "${{ secrets.DAGSHUB_TOKEN }}" ] || [ -z "${{ secrets.DAGSHUB_USERNAME }}" ]; then
            echo "DAGSHUB_TOKEN and DAGSHUB_USERNAME are required to pull the real dataset"
            exit 1
          fi

      - name: Pull real dataset with DVC
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote modify --local origin auth basic
          dvc remote modify --local origin user "$DAGSHUB_USERNAME"
          dvc remote modify --local origin password "$DAGSHUB_TOKEN"
          dvc pull data/raw/telcom_churn.csv.dvc

      - name: Run tests
        run: python -m pytest -m fast tests/
