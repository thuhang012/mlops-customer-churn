# CD workflow for the M5/CICD workstream.
# Purpose: build and smoke-test the container on every branch to validate Dockerfile + API startup.
name: CD

on:
  push:
    branches: ["**"]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'src/mlops_project/api/**'
      - 'scripts/entrypoint.sh'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mlops-project-api:cd .

      - name: Run container
        run: |
          docker run -d --name mlops-api-test -p 8000:8000 -e CI_SMOKE_MODE=true mlops-project-api:cd
          sleep 5

      - name: Smoke test health endpoint
        run: |
          for i in {1..12}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              echo "Health endpoint is up"
              exit 0
            fi
            echo "Waiting for service... attempt $i/12"
            sleep 5
          done
          echo "Service did not become healthy in time"
          exit 1

      - name: Print container logs on failure
        if: failure()
        run: docker logs mlops-api-test

      - name: Cleanup test container
        if: always()
        run: docker rm -f mlops-api-test || true

  deployment-report:
    runs-on: ubuntu-latest
    needs: [build-and-smoke-test]
    if: always()

    steps:
      - name: Write deployment summary
        run: |
          {
            echo "## CD Summary"
            echo "- Event: ${{ github.event_name }}"
            echo "- Ref: ${{ github.ref }}"
            echo "- Build and smoke test: ${{ needs['build-and-smoke-test'].result }}"
            echo "- Commit: ${{ github.sha }}"
          } >> $GITHUB_STEP_SUMMARY
