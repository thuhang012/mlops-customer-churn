name: CT

on:
  push:
    branches: ["main"]
    paths:
      - 'data/**'
      - 'src/mlops_project/data/**'
      - 'src/mlops_project/features/**'
      - 'src/mlops_project/models/**'
      - 'dvc.yaml'
      - 'dvc.lock'
      - 'scripts/validation/**'
      - '.github/workflows/ct.yml'
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Trigger reason'
        required: false
        type: choice
        options: [drift-detected, performance-degradation, manual-retrain, scheduled, data-updated]

concurrency:
  group: ct-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  BASELINE_METRICS_PATH: artifacts/baseline/metrics.json

jobs:
  prepare-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore baseline metrics cache
        id: restore-baseline-cache
        uses: actions/cache/restore@v4
        with:
          path: artifacts/baseline
          key: baseline-metrics-${{ github.ref_name }}
          restore-keys: |
            baseline-metrics-

      - name: Ensure baseline metrics file exists
        run: |
          mkdir -p artifacts/baseline
          if [ ! -f "${{ env.BASELINE_METRICS_PATH }}" ]; then
            printf '{\n  "f1_score": 0.60,\n  "roc_auc": 0.65\n}\n' > "${{ env.BASELINE_METRICS_PATH }}"
          fi

      - name: Ensure DagsHub secrets exist
        run: |
          if [ -z "${{ secrets.DAGSHUB_TOKEN }}" ] || [ -z "${{ secrets.DAGSHUB_USERNAME }}" ]; then
            echo "DAGSHUB_TOKEN and DAGSHUB_USERNAME are required for real-data CT"
            exit 1
          fi

      - name: Pull real data with DVC
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote modify --local origin auth basic
          dvc remote modify --local origin user "$DAGSHUB_USERNAME"
          dvc remote modify --local origin password "$DAGSHUB_TOKEN"
          dvc pull data/raw/netflix_large.csv.dvc

      - name: Verify pulled dataset
        run: |
          test -f data/raw/netflix_large.csv
          echo "Real dataset is available"

      - name: Validate data
        run: python scripts/validation/validate_data.py data/raw/netflix_large.csv

      - name: Preprocess real dataset
        run: |
          python -m src.mlops_project.data.preprocess \
            --input data/raw/netflix_large.csv \
            --output data/processed/cleaned_data.csv \
            --preprocessor artifacts/preprocessors/preprocessor.pkl

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: |
            data/processed/
            artifacts/preprocessors/
            artifacts/baseline/
          retention-days: 30

  train-and-evaluate:
    runs-on: ubuntu-latest
    needs: prepare-data

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: ./

      - name: Train model
        run: |
          python src/mlops_project/models/train.py \
            --config artifacts/models/best_model_config.yaml \
            --data data/processed/cleaned_data.csv \
            --models-dir artifacts/models \
            --mlflow-tracking-uri file:./mlruns

      - name: Evaluate trained model
        run: |
          python -m src.mlops_project.models.evaluate \
            --model artifacts/models/Netflix_Prediction_final.pkl \
            --data data/processed/cleaned_data.csv \
            --reports-dir reports

      - name: Quality gate check
        run: python scripts/validation/quality_gate.py artifacts/metrics/metrics.json artifacts/baseline/metrics.json 0.95

      - name: Run CT model quality tests
        run: python -m pytest -m ct tests/test_model_quality.py

      - name: Upload CT artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ct-artifacts
          path: |
            artifacts/models/
            artifacts/metrics/
            reports/
          retention-days: 365

  register-baseline:
    runs-on: ubuntu-latest
    needs: train-and-evaluate
    if: github.ref == 'refs/heads/main' && needs['train-and-evaluate'].result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download CT artifacts
        uses: actions/download-artifact@v4
        with:
          name: ct-artifacts
          path: ./

      - name: Register baseline metrics
        run: python scripts/training/register_model.py artifacts/metrics/metrics.json artifacts/baseline/metrics.json

      - name: Save baseline metrics cache
        uses: actions/cache/save@v4
        with:
          path: artifacts/baseline
          key: baseline-metrics-${{ github.ref_name }}-${{ github.run_id }}

      - name: Pipeline summary
        run: |
          echo "## ✅ CT Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Data Preparation**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Training and Evaluation**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Baseline Registration**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Reference Model Artifact**: artifacts/models/Netflix_Prediction_final.pkl" >> $GITHUB_STEP_SUMMARY

  pipeline-gate:
    runs-on: ubuntu-latest
    if: always()
    needs: [prepare-data, train-and-evaluate, register-baseline]

    steps:
      - name: Write CT summary
        run: |
          echo "## CT pipeline gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Data preparation: ${{ needs['prepare-data'].result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Train and evaluate: ${{ needs['train-and-evaluate'].result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Baseline registration: ${{ needs['register-baseline'].result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Interpretation" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs['prepare-data'].result }}" != "success" ]; then
            echo "- Data preparation failed." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs['train-and-evaluate'].result }}" != "success" ]; then
            echo "- Training or evaluation failed." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs['register-baseline'].result }}" != "success" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "- Baseline registration failed or was skipped." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Enforce CT pass or fail
        run: |
          if [ "${{ needs['prepare-data'].result }}" != "success" ]; then
            echo "CT failed: data preparation did not succeed"
            exit 1
          fi

          if [ "${{ needs['train-and-evaluate'].result }}" != "success" ]; then
            echo "CT failed: training and evaluation did not succeed"
            exit 1
          fi

          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ needs['register-baseline'].result }}" != "success" ]; then
            echo "CT failed: baseline registration did not succeed on main"
            exit 1
          fi

          echo "CT pipeline gate passed"
