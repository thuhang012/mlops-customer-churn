global:
  resolve_timeout: 5m

route:
  receiver: drift-default
  group_by: ["alertname", "severity", "type"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: drift-default

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: ["alertname"]